version: '3.8'

services:
  # RabbitMQ - Mensageria
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cadastro-rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cadastro-network

volumes:
  rabbitmq_data:

networks:
  cadastro-network:
    driver: bridge